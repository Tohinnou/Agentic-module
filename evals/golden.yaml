# Golden Dataset — comportement déterministe du SupportAgent (Phase 8.1)
#
# Contrat : voir meta/golden_dataset_spec.md. Runner : tests/test_golden.py.
# Chaque cas = un bloc BDD (Behavior-Driven Development) Gherkin (scenario/given/when/then), additif-by-append.
#
# `policy_doc_id` encode l'INTENTION (le doc sémantiquement correct), PAS la sortie
# observée. `retrieval_status: gap` = BM25 top-1 ne satisfait pas encore l'intention
# → le runner marque ce cas xfail(strict). C'est un bug tracké, pas un échec du dataset.
#
# Bilan run initial (2026-07-13) : classif/priorité 10/10 · retrieval top-1 3/10.
# MàJ post-stemming (Phase 8.1) : retrieval top-1 4/10 (cancel-normal fixé). Les 6 gaps
# restants se décomposent en 3 causes distinctes — le golden est devenu un instrument
# de diagnostic : 1 ambiguïté multi-intention · 4 corpus-coverage · 1 refusal.

meta:
  version: "0.2.0"
  runner:
    instantiation: "SupportAgent(enforce_policy=False, evaluate=False, session_id=<id>)"
    enforce_policy: false   # gouvernance testée ailleurs (Phase 6)
    evaluate: false         # qualité du draft = judge (Phase 8.3), pas ici
    network: none
  assertable_fields: [category, priority, policy_doc_id, placeholders_nonempty]
  categories: [cancellation, payment, booking, safety, weather, equipment, damage, other]
  priorities: [urgent, high, normal, low]

cases:
  # ---- Couche déterministe OK + retrieval OK ----
  - id: payment-double-charge
    scenario: "Double prélèvement carte → payment/normal, cite payment_policy"
    given: "un client signale une carte prélevée deux fois pour la même facture"
    when:
      question: "Ma carte a été prélevée deux fois pour la même facture."
    then:
      category: payment
      priority: normal
      policy_doc_id: payment_policy
      placeholders_nonempty: true
    retrieval_status: confirmed
    notes: "'carte'+'facture' discriminants → payment_policy (2.93). Cas robuste."

  - id: booking-availability
    scenario: "Demande de disponibilités → booking/normal, cite booking_rules"
    given: "un client demande les créneaux disponibles pour réserver"
    when:
      question: "Quelles sont les disponibilités pour une réservation la semaine prochaine ?"
    then:
      category: booking
      priority: normal
      policy_doc_id: booking_rules
      placeholders_nonempty: true
    retrieval_status: confirmed
    notes: "'disponibilités'+'réservation' → booking_rules (5.66 post-stemming). Robuste."

  - id: weather-storm-urgent
    scenario: "Alerte tempête → weather/urgent, cite weather_policy"
    given: "un client s'inquiète d'une tempête annoncée pour sa sortie de demain"
    when:
      question: "Orage et tempête annoncés, alerte météo pour demain."
    then:
      category: weather
      priority: urgent
      policy_doc_id: weather_policy
      placeholders_nonempty: true
    retrieval_status: confirmed
    notes: "4 tokens météo discriminants → weather_policy (7.40 post-stemming). Meilleur signal. URGENCY_KEYWORDS (tempête, alerte) → priority urgent."

  - id: cancel-refund-normal
    scenario: "Annulation sans urgence → cancellation/normal, cite cancellation_policy"
    given: "un client veut annuler et demande un remboursement, sans échéance"
    when:
      question: "Je veux annuler, comment obtenir un remboursement ?"
    then:
      category: cancellation
      priority: normal
      policy_doc_id: cancellation_policy
      placeholders_nonempty: true
    retrieval_status: confirmed
    notes: >-
      FIXÉ (Phase 8.1 stemming) — cas ① ranking résolu. 'annuler'→'annul' matche désormais
      'annulation'×5 du doc → cancellation_policy (2.25) > weather_policy (2.21). Avant le
      stemming, weather gagnait (2.06 vs 1.97) faute de match verbe→nom.

  # ---- Couche déterministe OK mais retrieval GAP (xfail sur policy_doc_id) ----
  - id: cancel-tomorrow-high
    scenario: "Annulation avec pression temporelle → cancellation/high, DOIT citer cancellation_policy"
    given: "un client doit annuler sa sortie de demain et demande un remboursement"
    when:
      question: "Je dois annuler ma sortie de demain, remboursement possible ?"
    then:
      category: cancellation
      priority: high
      policy_doc_id: cancellation_policy
      placeholders_nonempty: true
    retrieval_status: gap
    observed_doc: refund_policy
    notes: >-
      GAP défendable (ambiguïté multi-intention). 'demain' ∈ TIME_PRESSURE → priority high.
      Le stemming N'A PAS suffi : refund_policy (4.21) domine car 'rembours'×5 y écrase
      'annul'×1 ; cancellation_policy 2e (2.27). refund_policy répond littéralement à
      "remboursement possible ?" — défendable. Intent gardé = cancellation_policy (doc
      canonique de l'annulation) ; expose la limite d'une assertion single-doc sur requête
      multi-intention (backlog : schéma acceptable_docs ?).

  - id: weather-light-normal
    scenario: "Météo sans danger → weather/normal, DOIT citer weather_policy"
    given: "un client demande s'il y aura de la pluie ou de la houle, sans urgence"
    when:
      question: "Y a-t-il de la pluie ou de la houle prévue ?"
    then:
      category: weather
      priority: normal
      policy_doc_id: weather_policy
      placeholders_nonempty: true
    retrieval_status: gap
    observed_doc: safety_rules
    notes: >-
      GAP corpus-coverage (CONFIRMÉ post-stemming). 'pluie'/'houle' ABSENTS de weather_policy
      (il liste orages/vents/visibilité/alerte). BM25 renvoie safety_rules (2.30), weather
      absent du top-3. Le stemming ne crée pas de vocabulaire manquant. Aucun mot d'urgence →
      priority normal. Backlog : enrichir weather_policy (pluie, houle, vagues).

  - id: equipment-engine-failure
    scenario: "Panne moteur → equipment/normal, DOIT citer equipment_policy"
    given: "un client signale une panne moteur et un défaut sur le bateau"
    when:
      question: "Le moteur du bateau est en panne, un défaut est apparu."
    then:
      category: equipment
      priority: normal
      policy_doc_id: equipment_policy
      placeholders_nonempty: true
    retrieval_status: gap
    observed_doc: weather_policy
    notes: >-
      GAP corpus-coverage. 'moteur'/'panne'/'défaut' ABSENTS d'equipment_policy (qui parle de
      kayaks/paddles/dommage/réparation). BM25 renvoie toujours weather_policy (3.87), MAIS le
      stemming (bateau↔bateaux) a fait remonter equipment_policy en 3e (3.10, absent du top-3
      avant). Classif matche 4 tokens equipment pourtant. Backlog : vocabulaire de panne.

  - id: safety-person-overboard
    scenario: "Personne à l'eau → safety/urgent, DOIT citer safety_rules"
    given: "un client signale une personne tombée à l'eau et demande des secours"
    when:
      question: "Une personne est tombée à l'eau, on a besoin de secours !"
    then:
      category: safety
      priority: urgent
      policy_doc_id: safety_rules
      placeholders_nonempty: true
    retrieval_status: gap
    observed_doc: support_guidelines
    notes: >-
      GAP corpus-coverage. 'secours'/'tombée'/'eau' ABSENTS de safety_rules (qui parle de
      gilets/enfants/alcool/zones de navigation). BM25 renvoie support_guidelines (1.96).
      category safety → priority urgent (règle fixe). Backlog : safety_rules ne couvre pas
      l'urgence/secours/homme à la mer.

  - id: damage-collision
    scenario: "Collision et coque fissurée → damage/urgent ; corpus SANS doc dédié"
    given: "un client signale un accident : collision et coque fissurée"
    when:
      question: "Accident: collision avec un autre bateau, la coque est fissurée."
    then:
      category: damage
      priority: urgent
      policy_doc_id: equipment_policy
      placeholders_nonempty: true
    retrieval_status: gap
    observed_doc: privacy_policy
    notes: >-
      DOUBLE GAP : (a) LACUNE CORPUS — aucune policy dédiée aux dommages (10 docs, zéro
      'damage_policy'). Intention repliée sur equipment_policy (dommage matériel). (b) BM25
      renvoie privacy_policy (2.44), equipment_policy 2e très proche (2.42, remonté via
      stemming). 'accident'/'collision' ∈ URGENCY → priority urgent. Backlog : créer
      damage_policy OU acter equipment_policy comme home des dommages.

  - id: other-opening-hours
    scenario: "Question hors-corpus (horaires) → other/low ; refusal-gap"
    given: "un client demande les horaires d'ouverture, sujet couvert par aucune policy"
    when:
      question: "Bonjour, quels sont vos horaires d'ouverture ?"
    then:
      category: other
      priority: low
      policy_doc_id: support_guidelines
      placeholders_nonempty: true
    retrieval_status: gap
    observed_doc: booking_rules
    notes: >-
      GAP refusal (pas du ranking). Aucun mot-clé matché → other/low. Query hors-corpus
      (horaires). Post-stemming BM25 renvoie booking_rules (2.91, score bas) au lieu
      d'equipment_policy avant : le doc renvoyé change mais reste hors-sujet. Le vrai fix
      est un SEUIL DE REFUS min-score (backlog BM25 < seuil → escalade), pas du ranking.
